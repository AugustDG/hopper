name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          artifact="hopper_${GOOS}_${GOARCH}"
          out_dir="dist/${artifact}"
          mkdir -p "$out_dir"

          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "$out_dir/hopper" .
          tar -C "$out_dir" -czf "dist/${artifact}.tar.gz" hopper

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: hopper_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/hopper_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hopper_*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum hopper_*.tar.gz | sort > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hopper_*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
